name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Lint API
        run: npm run lint --workspace=api --if-present
      - name: Lint Web
        run: npm run lint --workspace=web --if-present
      - name: Build API
        run: npm run build --workspace=api
      - name: Build Web
        run: npm run build --workspace=web
      - name: Build Worker
        run: npm run build --workspace=worker

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
    env:
      MONGODB_URI: mongodb://localhost:27017/smart-bharat-test
      REDIS_URI: redis://localhost:6379
      JWT_SECRET: test_jwt_secret
      ADMIN_JWT_SECRET: test_admin_jwt_secret
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: Run API tests
        run: npm test --workspace=api
      - name: Run Worker tests
        run: npm test --workspace=worker
